name: Orlen Price Scraper & Extrator

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        # Added pdfplumber here
        run: pip install requests pdfplumber

      - name: Execute Scraper
        run: python script.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Update this line to include the new folder
          git add Orlen_Prices/*.pdf Price_Data/*.csv
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "Update prices and CSV for $(date +'%Y-%m-%d')"
            git push
          fi
