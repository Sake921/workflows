name: Orlen Price Scraper

on:
  schedule:
    # Runs at 08:00 UTC (10:00 AM/11:00 AM Lithuania time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual run button

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    # Crucial: This gives the bot permission to upload files to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      - name: Execute Scraper
        run: python script.py

      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Orlen_Prices/*.pdf
          # Only push if a new file was actually downloaded
          if git diff --staged --quiet; then
            echo "No new PDF found today."
          else
            git commit -m "Auto-add price protocol for ${yesterday}"
            git push
          fi
